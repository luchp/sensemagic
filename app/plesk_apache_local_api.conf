# Plesk custom Apache directive for sensemagic.nl
#
# PURPOSE: Allow local WordPress REST API access without HTTPS redirect.
# Plesk's vhost config forces HTTP→HTTPS for all requests, but when
# the discover.sh script runs ON the server, it connects to
# http://127.0.0.1:7080 which gets redirected to https://sensemagic.nl:443
# — unreachable from localhost (nginx only binds to the public IP).
#
# This rule skips the HTTPS redirect for requests from 127.0.0.1
# that target the WordPress REST API (/wp-json/).
#
# INSTALL: Copy to the Plesk Apache include directory:
#   cp plesk_apache_local_api.conf /var/www/vhosts/system/sensemagic.nl/conf/vhost.conf
#   systemctl restart apache2   (or: apachectl graceful)
#
# Alternatively, paste these directives in Plesk panel:
#   Domains → sensemagic.nl → Apache & nginx Settings →
#   "Additional directives for HTTP" text box

<IfModule mod_rewrite.c>
    RewriteEngine On
    # Skip HTTPS redirect for local REST API calls
    RewriteCond %{REMOTE_ADDR} ^127\.0\.0\.1$
    RewriteCond %{REQUEST_URI} ^/wp-json/
    RewriteRule .* - [L]
</IfModule>

